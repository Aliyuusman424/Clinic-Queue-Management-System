<!DOCTYPE html>
<html>
<head>
    <title>Clinic Queue Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <h1>Clinic Queue Management System</h1>

    <a href="/add">Add Patient</a> |
    <a href="/serve">Serve Next Patient</a>

    <h2>Waiting List</h2>

    <ul>
        {% for patient in patients %}
        <li>
            <strong>{{ patient.name }}</strong><br>
            <small>Time: {{ patient.time.strftime('%H:%M:%S') }}</small>
        </li>
        {% endfor %}
    </ul>

    <h3>Total Patients Served Today: {{ total }}</h3>

</body>
</html>
